<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover + user-scalable=no: avoids iOS double-tap zoom and lets
         the canvas fill the notch area on phones. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>XR Stage — WebXR foundation</title>
    <style>
      :root {
        --bitcoin: #f7931a;
        --ink: #e8e8ef;
        --panel: rgba(12, 14, 20, 0.72);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #05060a; }
      body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); }

      /* The Three.js canvas is injected here and fills the viewport. */
      #app { position: fixed; inset: 0; }
      canvas { display: block; touch-action: none; }

      /* ── HUD: a thin overlay of DOM buttons. Hidden during immersive sessions. ── */
      #hud {
        position: fixed; inset: 0; pointer-events: none; z-index: 10;
      }
      #hud .row {
        position: absolute; display: flex; gap: 8px; align-items: center;
      }
      #hud .top-left  { top: 12px; left: 12px; flex-direction: column; align-items: flex-start; }
      #hud .top-right { top: 12px; right: 12px; }
      #hud .bottom    { left: 50%; bottom: 18px; transform: translateX(-50%); }

      .badge {
        pointer-events: none;
        background: var(--panel); border: 1px solid rgba(255,255,255,0.12);
        border-radius: 8px; padding: 6px 10px; font-size: 13px; line-height: 1.2;
        backdrop-filter: blur(6px);
      }
      .badge b { color: var(--bitcoin); }

      button.btn {
        pointer-events: auto;
        background: var(--panel); color: var(--ink);
        border: 1px solid rgba(255,255,255,0.16); border-radius: 10px;
        padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
        backdrop-filter: blur(6px); transition: border-color .15s, background .15s;
      }
      button.btn:hover { border-color: var(--bitcoin); }
      button.btn:disabled { opacity: 0.4; cursor: default; }
      button.btn.primary { border-color: var(--bitcoin); }
      button.btn[hidden] { display: none; }

      /* Click-to-start hint for desktop pointer lock. */
      #lock-hint {
        position: fixed; inset: 0; display: grid; place-items: center; z-index: 5;
        pointer-events: none; color: rgba(232,232,239,0.7); font-size: 14px;
      }
      #lock-hint[hidden] { display: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="row top-left">
        <div class="badge" id="mode-badge">mode: <b id="mode-label">flat</b></div>
        <div class="badge" id="role-badge">role: <b id="role-label">listener</b></div>
        <div class="badge" id="presence-badge">in room: <b id="presence-count">1</b></div>
      </div>

      <div class="row top-right">
        <button class="btn" id="btn-vr" hidden>Enter VR</button>
        <button class="btn" id="btn-ar" hidden>Enter AR</button>
        <button class="btn" id="btn-recenter" hidden>Recenter</button>
      </div>

      <div class="row bottom">
        <button class="btn primary" id="btn-voice">Join voice</button>
        <button class="btn" id="btn-mute" hidden>Mute</button>
        <div class="badge" id="voice-count" hidden>🎙 <b id="speaker-count">0</b> speaking</div>
      </div>
    </div>

    <div id="lock-hint" hidden>click to look · WASD to move · Esc to release</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
