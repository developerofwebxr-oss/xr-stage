<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover + user-scalable=no: avoids iOS double-tap zoom and lets
         the canvas fill the notch area on phones. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>XR Stage — WebXR foundation</title>
    <style>
      :root {
        --bitcoin: #f7931a;
        --ink: #e8e8ef;
        --muted: rgba(232, 232, 239, 0.55);
        --panel: rgba(14, 16, 22, 0.78);
        --fill: rgba(255, 255, 255, 0.06);
        --line: rgba(255, 255, 255, 0.13);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #05060a; }
      body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); }

      #app { position: fixed; inset: 0; }
      canvas { display: block; touch-action: none; }

      /* HUD overlay: click-through except for explicit controls. */
      #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
      #hud[hidden] { display: none; }

      /* ── Shared pill container ──────────────────────────────────────────────── */
      .bar {
        pointer-events: auto;
        display: flex; align-items: center; gap: 10px;
        background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
        padding: 8px 12px; backdrop-filter: blur(10px);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.38);
      }

      /* ── Top status bar (B3 / Fix 5) ─────────────────────────────────────────── */
      #topbar {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 12;
        font-size: 13px; gap: 10px; max-width: calc(100vw - 16px);
      }
      #topbar > * { flex: 0 0 auto; }                 /* fixed items keep their size … */
      #now-speaking {                                  /* … the speaking line absorbs slack + truncates */
        flex: 1 1 auto; min-width: 0; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
      }
      #topbar b { color: var(--ink); font-weight: 600; }
      #topbar .muted { color: var(--muted); }
      #topbar .sep { width: 1px; height: 16px; background: var(--line); }
      .statedot {
        width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        margin-right: 6px; background: #6b7280; vertical-align: middle;
      }
      .statedot[data-state="connecting"] { background: #ffd479; }
      .statedot[data-state="connected"]  { background: #5be37a; }
      .statedot[data-state="failed"]     { background: #ff6b6b; }

      /* ── Bottom control bar (Fix 2) ──────────────────────────────────────────── */
      /* One pill, centred. Wide: a single row. Narrow: the two groups wrap into two
         tidy centred rows (each group stays intact — no offset stack). */
      #controlbar {
        position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 12;
        flex-wrap: wrap; justify-content: center; max-width: calc(100vw - 16px);
      }
      .grp { display: flex; align-items: center; justify-content: center; gap: 8px; }

      /* Mode cluster (B2): a segmented control. */
      .mode-cluster {
        display: inline-flex; gap: 3px; padding: 3px;
        background: var(--fill); border: 1px solid var(--line); border-radius: 10px;
      }
      .mode-cluster .mode {
        pointer-events: auto; border: 0; background: transparent; color: var(--ink);
        font: inherit; font-weight: 600; font-size: 13px; padding: 7px 13px;
        border-radius: 8px; cursor: pointer; transition: background .15s, color .15s, opacity .15s;
      }
      .mode-cluster .mode:hover:not(:disabled):not(.active) { background: rgba(255, 255, 255, 0.09); }
      .mode-cluster .mode.active { background: var(--bitcoin); color: #1a1205; }
      .mode-cluster .mode:disabled { opacity: 0.3; cursor: not-allowed; }

      /* Control buttons. */
      button.ctl {
        pointer-events: auto; background: var(--fill); color: var(--ink);
        border: 1px solid var(--line); border-radius: 10px; padding: 9px 14px;
        font: inherit; font-weight: 600; font-size: 13px; cursor: pointer;
        white-space: nowrap; transition: border-color .15s, background .15s, color .15s;
      }
      button.ctl:hover:not(:disabled):not(.soon) { border-color: var(--bitcoin); }
      button.ctl.primary { border-color: var(--bitcoin); }
      button.ctl.on { background: var(--bitcoin); color: #1a1205; border-color: var(--bitcoin); }
      button.ctl.soon { opacity: 0.4; cursor: not-allowed; }
      button.ctl[hidden] { display: none; }
      /* Free look: a small, standalone toggle beside the mode cluster. */
      #btn-freelook { padding: 6px 9px; font-size: 12px; }
      #btn-freelook[hidden] { display: none; }

      .speaking { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); padding: 0 2px; }
      .speaking b { color: var(--bitcoin); }
      .speaking[hidden] { display: none; }

      /* Error + toast. */
      .badge {
        pointer-events: none; background: var(--panel); border: 1px solid var(--line);
        border-radius: 8px; padding: 6px 10px; font-size: 13px; backdrop-filter: blur(6px);
      }
      .badge.err { border-color: #e5484d; color: #ffb4b4; }
      .badge.err b { color: #ffd0d0; }
      #voice-error {
        position: fixed; left: 50%; bottom: 78px; transform: translateX(-50%);
        max-width: 80vw; text-align: center; z-index: 12;
      }
      #voice-error[hidden] { display: none; }
      #toast {
        position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%); z-index: 13;
        background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
        padding: 8px 12px; font-size: 13px; color: var(--ink); backdrop-filter: blur(6px);
        white-space: nowrap; opacity: 0; transition: opacity .2s; pointer-events: none;
      }
      #toast.show { opacity: 1; }

      /* Click-to-start hint for desktop pointer lock. */
      #lock-hint {
        position: fixed; inset: 0; display: grid; place-items: center; z-index: 5;
        pointer-events: none; color: rgba(232, 232, 239, 0.7); font-size: 14px;
      }
      #lock-hint[hidden] { display: none; }

      /* ── Mobile movement joystick (Fix 3): bottom-left, low, clear of the bar ──── */
      #joystick {
        position: fixed; left: 16px; bottom: 22px; width: 120px; height: 120px;
        border-radius: 50%; z-index: 11; pointer-events: auto; touch-action: none;
        background: rgba(20, 24, 34, 0.4); border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(4px);
      }
      #joystick-thumb {
        position: absolute; left: 50%; top: 50%; width: 52px; height: 52px;
        margin: -26px 0 0 -26px; border-radius: 50%;
        background: rgba(247, 147, 26, 0.55); border: 1px solid rgba(255, 255, 255, 0.32);
        transform: translate(0, 0);
      }
      #joystick[hidden] { display: none; }

      /* ── Mobile layout: compact controls; joystick low-left; bar lifted clear ──── */
      body.mobile #topbar { font-size: 12px; gap: 8px; top: 10px; }
      body.mobile #controlbar { bottom: 124px; gap: 8px; }   /* sits above the joystick */
      body.mobile button.ctl { padding: 8px 10px; font-size: 12px; }
      body.mobile #btn-freelook { padding: 6px 8px; font-size: 11px; }
      body.mobile .mode-cluster .mode { padding: 6px 10px; font-size: 12px; }
      body.mobile #joystick { left: 14px; bottom: 16px; width: 96px; height: 96px; }
      body.mobile #joystick-thumb { width: 42px; height: 42px; margin: -21px 0 0 -21px; }
      body.mobile #voice-error, body.mobile #toast { bottom: 214px; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <!-- Top status (B3 / Fix 5) -->
      <header id="topbar" class="bar">
        <span>⌂ <b id="room-label">main-stage</b></span>
        <span class="sep"></span>
        <span><span class="statedot" id="voice-dot" data-state="idle"></span><span id="voice-status" class="muted">idle</span></span>
        <span class="sep"></span>
        <span id="now-speaking" class="muted">— no one speaking —</span>
        <span class="sep"></span>
        <span>👥 <b id="presence-count">1</b></span>
      </header>

      <!-- Bottom control bar (Fix 2): two groups that wrap into ≤2 tidy rows -->
      <div id="controlbar" class="bar">
        <div class="grp">
          <button class="ctl" id="btn-freelook" hidden>Free look: off</button>
          <div class="mode-cluster" role="group" aria-label="Mode">
            <button class="mode" id="mode-screen" data-mode="screen">Screen</button>
            <button class="mode" id="mode-vr" data-mode="vr">VR</button>
            <button class="mode" id="mode-ar" data-mode="ar">AR</button>
          </div>
        </div>
        <div class="grp">
          <button class="ctl primary" id="btn-voice">Listen: off</button>
          <button class="ctl soon" id="btn-request" aria-disabled="true"
                  title="Available in a later phase" hidden>Request to speak</button>
          <button class="ctl soon" id="btn-zap" aria-disabled="true"
                  title="Zaps arrive in a later phase">⚡ Zap</button>
          <span class="speaking" id="voice-count" hidden>🎙 <b id="speaker-count">0</b></span>
        </div>
      </div>

      <div class="badge err" id="voice-error" hidden></div>
      <div id="toast"></div>
    </div>

    <!-- Mobile-only virtual joystick; shown by main.js after feature detection. -->
    <div id="joystick" hidden><div id="joystick-thumb"></div></div>

    <div id="lock-hint" hidden>hold-drag to look · WASD to move · Free look for mouse-look</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
