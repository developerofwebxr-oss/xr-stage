<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover + user-scalable=no: avoids iOS double-tap zoom and lets
         the canvas fill the notch area on phones. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>XR Stage — WebXR foundation</title>
    <style>
      /* ════════════════════════════════════════════════════════════════════════
         "Live Console" design system — instrumentation over a dark spatial stage.
         Reusable tokens below seed Phase 2+ surfaces (identity, zap, chat).
         ════════════════════════════════════════════════════════════════════════ */
      :root {
        color-scheme: dark;

        --bg: #05060a;
        --ink: #eceef5;
        --ink-dim: rgba(236, 238, 245, 0.6);
        --ink-faint: rgba(236, 238, 245, 0.4);

        /* Primary accent — Bitcoin (sats / energy / "live"). */
        --orange: #f7931a;
        --orange-bright: #ffb24a;
        --orange-ink: #1a1206;
        /* Secondary accent — Nostr identity (focus rings now; Phase 2 surfaces). */
        --violet: #9b6cff;

        /* State LEDs. */
        --ok: #54e08a;
        --warn: #ffcf6b;
        --bad: #ff6f6b;

        /* Glass panels + lines. */
        --panel: rgba(12, 14, 19, 0.72);
        --panel-edge: rgba(255, 255, 255, 0.10);
        --fill: rgba(255, 255, 255, 0.045);
        --fill-hover: rgba(255, 255, 255, 0.09);
        --hairline: rgba(255, 255, 255, 0.12);

        --r-lg: 16px;
        --r-md: 11px;
        --r-sm: 8px;

        --shadow: 0 12px 40px -14px rgba(0, 0, 0, 0.75);
        --ring-inset: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        --glow-orange: 0 0 16px -3px rgba(247, 147, 26, 0.6);

        --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

        --t: 150ms cubic-bezier(0.4, 0.1, 0.2, 1);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); }
      body { font-family: var(--font-ui); color: var(--ink); }

      #app { position: fixed; inset: 0; }
      /* Canvas fills the live visual viewport. 100dvh tracks mobile browser-chrome
         show/hide so there's never a black band; display size is CSS, buffer is set
         by syncViewport() in main.js. */
      canvas { position: fixed; inset: 0; width: 100vw; height: 100dvh; display: block; touch-action: none; }

      /* HUD overlay: anchored to the viewport (not the canvas), click-through except
         for explicit controls. */
      #hud { position: fixed; inset: 0; height: 100dvh; pointer-events: none; z-index: 10; }
      #hud[hidden] { display: none; }

      /* Inline instrument icons (monochrome, inherit text colour). */
      .ico {
        width: 14px; height: 14px; flex: 0 0 auto; vertical-align: -2px;
        fill: none; stroke: currentColor; stroke-width: 1.8;
        stroke-linecap: round; stroke-linejoin: round; opacity: 0.85;
      }

      /* Keyboard focus — violet identity ring, distinct from hover/active orange. */
      :focus-visible { outline: 2px solid var(--violet); outline-offset: 2px; }

      /* ── Shared glass pill ──────────────────────────────────────────────────── */
      .bar {
        pointer-events: auto;
        display: flex; align-items: center; gap: 10px;
        background: var(--panel); border: 1px solid var(--panel-edge);
        border-radius: var(--r-lg); padding: 8px 12px;
        backdrop-filter: blur(16px) saturate(1.3);
        -webkit-backdrop-filter: blur(16px) saturate(1.3);
        box-shadow: var(--shadow), var(--ring-inset);
      }

      /* ── Top status bar — instrument readouts ─────────────────────────────────── */
      #topbar {
        position: fixed; top: calc(env(safe-area-inset-top) + 12px); left: 50%;
        transform: translateX(-50%); z-index: 12;
        font-family: var(--font-mono); font-size: 13px; gap: 10px;
        max-width: calc(100vw - 16px);
      }
      #topbar > * { flex: 0 0 auto; }
      .field { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-dim); }
      #now-speaking {
        flex: 1 1 auto; min-width: 0; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; color: var(--ink-dim);
      }
      #topbar b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
      #topbar .muted { color: var(--ink-dim); }
      #topbar .sep { width: 1px; height: 14px; background: var(--hairline); }

      /* Connection LED — a tally light; pulses gently when live. */
      .statedot {
        width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        background: #5b6472; flex: 0 0 auto;
      }
      .statedot[data-state="connecting"] { background: var(--warn); }
      .statedot[data-state="connected"]  { background: var(--ok); animation: tally 2.4s ease-out infinite; }
      .statedot[data-state="failed"]     { background: var(--bad); }
      @keyframes tally {
        0%   { box-shadow: 0 0 0 0 rgba(84, 224, 138, 0.5); }
        70%  { box-shadow: 0 0 0 6px rgba(84, 224, 138, 0); }
        100% { box-shadow: 0 0 0 0 rgba(84, 224, 138, 0); }
      }

      /* ── Bottom control bar ───────────────────────────────────────────────────── */
      #controlbar {
        position: fixed; bottom: calc(env(safe-area-inset-bottom) + 16px); left: 50%;
        transform: translateX(-50%); z-index: 12;
        flex-wrap: wrap; justify-content: center;
        width: max-content; max-width: calc(100vw - 16px); /* one row wide; wraps when capped on narrow */
      }
      /* Powered "energy line" along the top edge — marks the live action surface. */
      #controlbar::before {
        content: ""; position: absolute; left: 16px; right: 16px; top: 0; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(247, 147, 26, 0.6), transparent);
        opacity: 0.7; pointer-events: none;
      }
      .grp { display: flex; align-items: center; justify-content: center; gap: 8px; }

      /* Mode cluster — channel selector. */
      .mode-cluster {
        display: inline-flex; gap: 3px; padding: 3px;
        background: rgba(0, 0, 0, 0.28); border: 1px solid var(--hairline); border-radius: var(--r-md);
      }
      .mode-cluster .mode {
        pointer-events: auto; border: 0; background: transparent; color: var(--ink-dim);
        font-family: var(--font-mono); font-weight: 600; font-size: 11px;
        text-transform: uppercase; letter-spacing: 0.08em;
        padding: 7px 13px; border-radius: 8px; cursor: pointer; transition: all var(--t);
      }
      .mode-cluster .mode:hover:not(:disabled):not(.active) { background: var(--fill-hover); color: var(--ink); }
      .mode-cluster .mode.active { background: var(--orange); color: var(--orange-ink); box-shadow: var(--glow-orange); }
      .mode-cluster .mode:disabled { opacity: 0.28; cursor: not-allowed; }

      /* Control buttons. */
      button.ctl {
        pointer-events: auto; background: var(--fill); color: var(--ink);
        border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 9px 14px;
        font-family: var(--font-ui); font-weight: 600; font-size: 13px; cursor: pointer;
        white-space: nowrap; transition: all var(--t); box-shadow: var(--ring-inset);
      }
      button.ctl:hover:not(:disabled):not(.soon) { border-color: rgba(247, 147, 26, 0.6); background: var(--fill-hover); }
      button.ctl.primary { border-color: rgba(247, 147, 26, 0.55); color: var(--orange-bright); } /* armed */
      button.ctl.on { background: var(--orange); color: var(--orange-ink); border-color: var(--orange); box-shadow: var(--glow-orange), var(--ring-inset); } /* live */
      button.ctl.soon { opacity: 0.42; color: var(--ink-dim); cursor: not-allowed; }
      button.ctl .ico { vertical-align: -3px; margin-right: 5px; opacity: 0.95; }
      button.ctl[hidden] { display: none; }
      /* Free look: a standalone toggle beside the mode cluster. Inherits button.ctl
         sizing so it matches the height/padding of its neighbours (Screen/VR/AR
         pill, Listen/Speak) — only the resting colour is dimmed. */
      #btn-freelook { color: var(--ink-dim); }
      #btn-freelook[hidden] { display: none; }

      /* Sign-in control → a compact "me" chip (keyface + name) once signed in. */
      #btn-signin.me { display: inline-flex; align-items: center; gap: 7px; color: var(--ink); }
      #btn-signin.me span { font-weight: 600; }
      #btn-signin .me-face { width: 18px; height: 18px; border-radius: 5px; display: block; }

      .speaking {
        display: flex; align-items: center; gap: 6px; padding: 0 2px;
        font-family: var(--font-mono); font-size: 13px; color: var(--ink-dim);
      }
      .speaking b { color: var(--orange); font-variant-numeric: tabular-nums; }
      .speaking[hidden] { display: none; }

      /* ── Transient surfaces: badges, toast, hints ─────────────────────────────── */
      .badge {
        pointer-events: none; background: var(--panel); border: 1px solid var(--panel-edge);
        border-radius: var(--r-md); padding: 7px 11px; font-size: 13px;
        backdrop-filter: blur(12px) saturate(1.3); -webkit-backdrop-filter: blur(12px) saturate(1.3);
        box-shadow: var(--shadow), var(--ring-inset);
      }
      .badge.err { border-color: rgba(255, 111, 107, 0.55); color: #ffc9c7; }
      .badge.err b { color: #ffe0df; }
      #voice-error {
        position: fixed; left: 50%; bottom: 78px; transform: translateX(-50%);
        max-width: 80vw; text-align: center; z-index: 12;
      }
      #voice-error[hidden] { display: none; }
      #toast {
        position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%); z-index: 13;
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: var(--r-md);
        padding: 8px 13px; font-size: 13px; color: var(--ink); white-space: nowrap;
        backdrop-filter: blur(12px) saturate(1.3); -webkit-backdrop-filter: blur(12px) saturate(1.3);
        box-shadow: var(--shadow), var(--ring-inset);
        opacity: 0; transition: opacity var(--t); pointer-events: none;
      }
      #toast.show { opacity: 1; }

      /* ── Profile card (Phase 2.2/2.3): fixed DOM panel, right-centre, always the
         same size/position so a far avatar's card is just as readable as a near one. */
      #profile-card {
        position: fixed; z-index: 14;
        right: calc(env(safe-area-inset-right) + 16px);
        bottom: calc(env(safe-area-inset-bottom) + 84px); /* low-right, above the control bar */
        width: 280px; max-width: calc(100vw - 32px); pointer-events: auto;
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: var(--r-lg);
        padding: 16px; color: var(--ink);
        backdrop-filter: blur(16px) saturate(1.3); -webkit-backdrop-filter: blur(16px) saturate(1.3);
        box-shadow: var(--shadow), var(--ring-inset);
      }
      #profile-card[hidden] { display: none; }
      #profile-card::before { /* orange accent rule */
        content: ""; position: absolute; left: 16px; right: 16px; top: 0; height: 2px;
        background: linear-gradient(90deg, transparent, rgba(247, 147, 26, 0.7), transparent);
      }
      .pc-close {
        position: absolute; top: 8px; right: 10px; width: 26px; height: 26px;
        pointer-events: auto; background: transparent; border: 0; cursor: pointer;
        color: var(--ink-dim); font-size: 16px; line-height: 1; border-radius: 6px;
      }
      .pc-close:hover { color: var(--ink); background: var(--fill-hover); }
      .pc-head { display: flex; gap: 12px; align-items: center; }
      .pc-face { width: 56px; height: 56px; border-radius: 12px; display: block; flex: 0 0 auto; }
      .pc-meta { min-width: 0; }
      .pc-name { font-family: var(--font-mono); font-weight: 600; font-size: 16px; }
      .pc-npub, .pc-nip05 {
        font-family: var(--font-mono); font-size: 12px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .pc-npub { color: var(--ink-dim); margin-top: 2px; }
      .pc-nip05 { color: rgba(247, 147, 26, 0.85); margin-top: 1px; }
      .pc-actions { display: flex; gap: 8px; margin-top: 14px; }
      .pc-actions .ctl { flex: 1; padding: 8px 6px; font-size: 12px; text-align: center; }

      /* Transient controls hint — top-centre, fades in on load / out on first input. */
      #lock-hint {
        position: fixed; top: 58px; left: 50%; transform: translateX(-50%); z-index: 9;
        pointer-events: none; color: var(--ink-dim);
        font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.01em; white-space: nowrap;
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: var(--r-md);
        padding: 6px 12px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--shadow), var(--ring-inset);
        opacity: 0; transition: opacity 0.35s;
      }
      #lock-hint.show { opacity: 1; }
      #lock-hint[hidden] { display: none; }

      /* Free-look ESC hint — shown while desktop pointer-lock hides the cursor. */
      #freelook-hint {
        position: fixed; top: 58px; left: 50%; transform: translateX(-50%); z-index: 9;
        pointer-events: none; color: var(--ink); font-size: 13px; white-space: nowrap;
        background: var(--panel); border: 1px solid rgba(247, 147, 26, 0.55); border-radius: var(--r-md);
        padding: 7px 13px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--shadow), var(--glow-orange);
      }
      #freelook-hint b { color: var(--orange-bright); font-weight: 700; letter-spacing: 0.04em; }
      #freelook-hint[hidden] { display: none; }

      /* ── Mobile movement joystick: bottom-left, low, clear of the bar ──────────── */
      #joystick {
        position: fixed; left: calc(env(safe-area-inset-left) + 16px);
        bottom: calc(env(safe-area-inset-bottom) + 22px); width: 120px; height: 120px;
        border-radius: 50%; z-index: 11; pointer-events: auto; touch-action: none;
        background: radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.06), rgba(10, 12, 17, 0.5));
        border: 1px solid var(--hairline);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        box-shadow: var(--shadow), var(--ring-inset);
      }
      #joystick-thumb {
        position: absolute; left: 50%; top: 50%; width: 52px; height: 52px;
        margin: -26px 0 0 -26px; border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, var(--orange-bright), var(--orange));
        border: 1px solid rgba(255, 255, 255, 0.35);
        box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.6), var(--glow-orange);
        transform: translate(0, 0);
      }
      #joystick[hidden] { display: none; }

      /* ── Mobile jump button: bottom-right, mirroring the joystick ───────────────── */
      #jump-btn {
        position: fixed; right: calc(env(safe-area-inset-right) + 16px);
        bottom: calc(env(safe-area-inset-bottom) + 22px); width: 72px; height: 72px;
        border-radius: 50%; z-index: 11; pointer-events: auto; touch-action: manipulation;
        display: inline-flex; align-items: center; justify-content: center;
        color: var(--orange-bright);
        background: radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.06), rgba(10, 12, 17, 0.5));
        border: 1px solid var(--hairline);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        box-shadow: var(--shadow), var(--ring-inset);
        transition: transform var(--t), background var(--t);
      }
      #jump-btn:active { transform: scale(0.92); background: rgba(247, 147, 26, 0.18); }
      #jump-btn[hidden] { display: none; }

      /* ── Mobile layout: bar flush at the bottom; joystick floats just above it ──── */
      /* --control-bar-h is measured in main.js (ResizeObserver) — the bar is 1 row in
         landscape, 2 rows in portrait — so the joystick always clears it. */
      body.mobile #topbar { font-size: 12px; gap: 8px; top: calc(env(safe-area-inset-top) + 10px); }
      body.mobile #controlbar { bottom: calc(env(safe-area-inset-bottom) + 8px); gap: 8px; } /* flush to the bottom edge */
      body.mobile button.ctl { padding: 8px 10px; font-size: 12px; }
      body.mobile .mode-cluster .mode { padding: 6px 10px; font-size: 12px; }
      body.mobile #joystick {
        left: calc(env(safe-area-inset-left) + 14px);
        bottom: calc(env(safe-area-inset-bottom) + var(--control-bar-h, 96px) + 16px); /* above the bar */
        width: 96px; height: 96px;
      }
      body.mobile #joystick-thumb { width: 42px; height: 42px; margin: -21px 0 0 -21px; }
      body.mobile #jump-btn {
        right: calc(env(safe-area-inset-right) + 14px);
        bottom: calc(env(safe-area-inset-bottom) + var(--control-bar-h, 96px) + 16px); /* above the bar */
        width: 64px; height: 64px;
      }
      /* Error + toast sit just above the bar too. */
      body.mobile #voice-error, body.mobile #toast { bottom: calc(env(safe-area-inset-bottom) + var(--control-bar-h, 96px) + 16px); }
      /* Profile card clears the taller mobile control bar (bottom-right). */
      body.mobile #profile-card { bottom: calc(env(safe-area-inset-bottom) + var(--control-bar-h, 96px) + 16px); }

      /* ── Comfort: movement vignette (opt-in, off by default) ──────────────────── */
      /* A tunnelling vignette that fades in while moving — a motion-sickness aid.
         Behind the HUD (z 8), click-through. Only meaningful in flat; VR uses a
         shader vignette (device-only). */
      #vignette {
        position: fixed; inset: 0; z-index: 8; pointer-events: none; opacity: 0;
        transition: opacity 180ms ease-out;
        background: radial-gradient(ellipse at center, transparent 36%, rgba(0, 0, 0, 0.9) 94%);
      }
      #vignette[hidden] { display: none; }

      /* ── Pause / Menu (X · Esc·M · ☰): Resume · Exit · comfort toggles ─────────── */
      #pause-menu {
        position: fixed; inset: 0; z-index: 20; pointer-events: auto;
        display: flex; align-items: center; justify-content: center;
        background: rgba(3, 4, 8, 0.55);
        backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
      }
      #pause-menu[hidden] { display: none; }
      #pause-panel {
        flex-direction: column; align-items: stretch; gap: 9px;
        width: min(320px, calc(100vw - 32px)); padding: 18px;
      }
      .pm-title {
        font-family: var(--font-mono); font-weight: 600; font-size: 15px;
        letter-spacing: 0.04em;
      }
      #pause-panel .ctl { text-align: center; }
      .pm-section {
        margin-top: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim);
        text-transform: uppercase; letter-spacing: 0.08em;
      }
      .pm-hint { text-transform: none; letter-spacing: 0; color: var(--ink-faint); }
      .pm-toggle {
        display: flex; align-items: center; gap: 10px; padding: 7px 2px;
        font-size: 13px; color: var(--ink); cursor: pointer; pointer-events: auto;
      }
      .pm-toggle input { width: 16px; height: 16px; accent-color: var(--orange); cursor: pointer; }

      /* ── Zap: spend-menu hub + amount picker (flat/mobile) ────────────────────── */
      #spend-menu, #zap-picker {
        position: fixed; inset: 0; z-index: 20; pointer-events: auto;
        display: flex; align-items: center; justify-content: center;
        background: rgba(3, 4, 8, 0.55);
        backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
      }
      #spend-menu[hidden], #zap-picker[hidden] { display: none; }
      #spend-panel, #zap-picker-panel {
        position: relative; flex-direction: column; align-items: stretch; gap: 9px;
        width: min(320px, calc(100vw - 32px)); padding: 18px;
      }
      #spend-panel .ctl, #zap-picker-panel .ctl { text-align: center; }
      #spend-wallet { font-family: var(--font-mono); font-size: 13px; color: var(--ink-dim); padding: 2px 0 4px; }
      #spend-wallet b { color: var(--orange); font-variant-numeric: tabular-nums; }
      #spend-wallet .ctl { text-align: center; width: 100%; }
      #zp-presets { display: flex; gap: 8px; }
      #zp-presets .ctl { flex: 1; }
      .zp-preset.sel { background: var(--orange); color: var(--orange-ink); border-color: var(--orange); box-shadow: var(--glow-orange); }
      .zp-custom { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; color: var(--ink-dim); }
      .zp-custom input {
        flex: 1; background: var(--fill); border: 1px solid var(--hairline); border-radius: var(--r-sm);
        color: var(--ink); padding: 8px 10px; font-family: var(--font-mono); font-size: 14px;
      }
      .zp-actions { display: flex; gap: 8px; margin-top: 2px; }
      .zp-actions .ctl { flex: 1; }

      /* Small wallet balance readout, sits beside the Zap control. */
      #wallet-balance {
        display: inline-flex; align-items: center; gap: 4px; padding: 0 4px;
        font-family: var(--font-mono); font-size: 13px; color: var(--ink-dim);
      }
      #wallet-balance b { color: var(--orange); font-variant-numeric: tabular-nums; }
      #wallet-balance[hidden] { display: none; }

      /* Respect reduced-motion: no pulse, near-instant transitions. */
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <!-- Comfort vignette during movement (opt-in via the menu; off by default). -->
      <div id="vignette" hidden></div>

      <!-- Top status: room · connection · speaking · count -->
      <header id="topbar" class="bar">
        <span class="field">
          <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/><path d="M8.5 8.5a5 5 0 0 0 0 7M15.5 8.5a5 5 0 0 1 0 7M6 6a8.5 8.5 0 0 0 0 12M18 6a8.5 8.5 0 0 1 0 12"/></svg>
          <b id="room-label">main-stage</b>
        </span>
        <span class="sep"></span>
        <span class="field"><span class="statedot" id="voice-dot" data-state="idle"></span><span id="voice-status" class="muted">idle</span></span>
        <span class="sep"></span>
        <span id="now-speaking" class="muted">— no one speaking —</span>
        <span class="sep"></span>
        <span class="field">
          <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.4-5 5.5-5s5.5 2 5.5 5"/><path d="M16 6.6a3 3 0 0 1 0 5.4M17.2 14c2.4.4 3.8 2.2 3.8 5"/></svg>
          <b id="presence-count">1</b>
        </span>
      </header>

      <!-- Bottom control bar: two groups that wrap into ≤2 tidy rows -->
      <div id="controlbar" class="bar">
        <div class="grp">
          <button class="ctl" id="btn-menu" aria-label="Menu" title="Menu (Esc / M)">☰</button>
          <button class="ctl" id="btn-signin">Sign in</button>
          <button class="ctl" id="btn-freelook" hidden>Free look: off</button>
          <div class="mode-cluster" role="group" aria-label="Mode">
            <button class="mode" id="mode-screen" data-mode="screen">Screen</button>
            <button class="mode" id="mode-vr" data-mode="vr">VR</button>
            <button class="mode" id="mode-ar" data-mode="ar">AR</button>
          </div>
        </div>
        <div class="grp">
          <button class="ctl primary" id="btn-voice">Listen: off</button>
          <button class="ctl soon" id="btn-request" aria-disabled="true"
                  title="Available in a later phase" hidden>Request to speak</button>
          <button class="ctl" id="btn-zap" title="Sats / Zap">
            <svg class="ico" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>Zap</button>
          <span id="wallet-balance" hidden><svg class="ico" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg><b id="wallet-balance-val">0</b></span>
          <span class="speaking" id="voice-count" hidden>
            <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/></svg>
            <b id="speaker-count">0</b></span>
        </div>
      </div>

      <!-- Profile card (fixed corner; opened by clicking an avatar). -->
      <aside id="profile-card" hidden>
        <button class="pc-close" id="pc-close" aria-label="Close">✕</button>
        <div class="pc-head">
          <img class="pc-face" id="pc-face" alt="" />
          <div class="pc-meta">
            <div class="pc-name" id="pc-name"></div>
            <div class="pc-npub" id="pc-npub"></div>
            <div class="pc-nip05" id="pc-nip05"></div>
          </div>
        </div>
        <div class="pc-actions">
          <button class="ctl" id="pc-visit">Visit profile</button>
          <button class="ctl" id="pc-follow">Follow</button>
          <button class="ctl" id="pc-zap">⚡ Zap</button>
        </div>
      </aside>

      <!-- Pause / Menu (opened by VR X · desktop Esc·M · the ☰ button). -->
      <div id="pause-menu" hidden>
        <div id="pause-panel" class="bar" role="dialog" aria-modal="true" aria-label="Menu">
          <div class="pm-title">Menu</div>
          <button class="ctl" id="pm-resume">Resume</button>
          <button class="ctl" id="pm-exit">Exit to screen mode</button>
          <div class="pm-section">Comfort <span class="pm-hint">— all off by default</span></div>
          <label class="pm-toggle"><input type="checkbox" id="pm-vignette" /> <span>Vignette while moving</span></label>
          <label class="pm-toggle"><input type="checkbox" id="pm-snapTurn" /> <span>Snap turn (instead of smooth)</span></label>
          <label class="pm-toggle"><input type="checkbox" id="pm-haptics" /> <span>Haptics (fire · grab · land)</span></label>
        </div>
      </div>

      <!-- Spend-menu hub (opened by the control-bar Zap): home for all sats actions. -->
      <div id="spend-menu" hidden>
        <div id="spend-panel" class="bar" role="dialog" aria-modal="true" aria-label="Sats">
          <div class="pm-title">Sats</div>
          <div id="spend-wallet"><!-- connect button or balance, filled by zapUI --></div>
          <div class="pm-section">Actions</div>
          <button class="ctl" id="sp-zap-someone">⚡ Zap someone</button>
          <button class="ctl soon" id="sp-zap-comment" disabled>Zap to comment — soon</button>
          <button class="ctl soon" id="sp-zap-request" disabled>Zap to request to speak — soon</button>
        </div>
      </div>

      <!-- Amount picker (flat/mobile): presets + custom → confirm → wallet.zap(). -->
      <div id="zap-picker" hidden>
        <div id="zap-picker-panel" class="bar" role="dialog" aria-modal="true" aria-label="Zap amount">
          <button class="pc-close" id="zp-close" aria-label="Close">✕</button>
          <div class="pm-title">Zap <span id="zp-name"></span></div>
          <div id="zp-presets">
            <button class="ctl zp-preset" data-amt="21">21</button>
            <button class="ctl zp-preset" data-amt="100">100</button>
            <button class="ctl zp-preset" data-amt="1000">1000</button>
          </div>
          <label class="zp-custom">custom sats
            <input type="number" id="zp-amount" min="1" step="1" value="21" inputmode="numeric" />
          </label>
          <div class="zp-actions">
            <button class="ctl" id="zp-cancel">Cancel</button>
            <button class="ctl primary" id="zp-send">Send ⚡</button>
          </div>
        </div>
      </div>

      <div class="badge err" id="voice-error" hidden></div>
      <div id="toast"></div>
    </div>

    <!-- Mobile-only virtual joystick; shown by main.js after feature detection. -->
    <div id="joystick" hidden><div id="joystick-thumb"></div></div>

    <!-- Mobile-only jump button; mirrors the joystick on the bottom-right. -->
    <button id="jump-btn" hidden aria-label="Jump">
      <svg viewBox="0 0 24 24" aria-hidden="true" width="26" height="26"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V6"/><path d="M6 11l6-6 6 6"/>
      </svg>
    </button>

    <div id="lock-hint" hidden>hold-drag to look · WASD move · Shift run · Space jump · Esc menu</div>
    <div id="freelook-hint" hidden>Free look on — press <b>ESC</b> to exit</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
